name: source checks

on:
  push:
  pull_request:

jobs:
  static-and-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.lock
      - name: Publication privacy audit
        run: ./scripts/verify_publication.sh
      - name: Python unit tests
        run: python -m unittest discover -s backend/tests -p 'test_*.py' -v
      - name: Builder and projection tests
        run: python -m unittest discover -s tests/data -p 'test_*.py' -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Frontend tests
        working-directory: frontend
        run: pnpm test
      - name: Production build
        working-directory: frontend
        run: pnpm run build
